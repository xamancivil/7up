<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0"/>

<title>Free IPTV</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

<style>

:root{

  --bg:#07090d;
  --card:#12151d;
  --text:#fff;
  --muted:#9ca3af;
  --accent:#00c6ff;
  --accent2:#7d5cff;

}

*{

  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;

}

html,body{

  width:100%;
  height:100%;

}

body{

  background:var(--bg);
  color:white;
  font-family:'Poppins',sans-serif;
  overflow:hidden;

}

.app{

  height:100vh;
  overflow-y:auto;
  padding-bottom:90px;

}

.app::-webkit-scrollbar{
  display:none;
}

/* ===== NAVBAR ===== */

.navbar{

  position:sticky;
  top:0;
  z-index:999;

  height:74px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:0 16px;

  background:#0b0d12;

  border-bottom:
  1px solid rgba(255,255,255,.05);

}

.logo{

  font-size:28px;
  font-weight:800;

  background:
  linear-gradient(
    90deg,
    var(--accent),
    var(--accent2)
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

}

.live-badge{

  background:#ff0000;

  padding:8px 14px;

  border-radius:50px;

  font-size:12px;
  font-weight:700;

}

/* ===== HERO ===== */

.hero{

  position:sticky;
  top:74px;
  z-index:50;

  background:var(--bg);

  padding:12px;

}

/* ===== PLAYER ===== */

.player-card{

  overflow:hidden;

  border-radius:22px;

  background:black;

  border:
  1px solid rgba(255,255,255,.06);

}

video{

  width:100%;

  height:30vh;

  background:black;

  object-fit:contain;

}

.plyr--fullscreen-active video{

  width:100vw !important;
  height:100vh !important;

  object-fit:contain !important;

  background:black;

}

/* ===== CONTROLS ===== */

.controls{

  margin-top:12px;

  display:flex;

  gap:10px;

  overflow-x:auto;

}

.controls::-webkit-scrollbar{
  display:none;
}

.select,
.search{

  height:48px;

  border:none;
  outline:none;

  border-radius:14px;

  background:#12151d;

  border:
  1px solid rgba(255,255,255,.06);

  color:white;

  padding:0 14px;

  font-size:14px;

}

.select{
  min-width:150px;
}

.search{
  flex:1;
}

/* ===== SEARCH ===== */

.search-box{

  margin-top:12px;

}

/* ===== CATEGORY ===== */

.category-slider{

  margin-top:12px;

  display:flex;

  gap:10px;

  overflow-x:auto;

  padding-bottom:8px;

  scrollbar-width:none;

}

.category-slider::-webkit-scrollbar{
  display:none;
}

.category-item{

  min-width:max-content;

  padding:10px 16px;

  border-radius:50px;

  background:#12151d;

  border:
  1px solid rgba(255,255,255,.06);

  display:flex;
  align-items:center;
  gap:8px;

  cursor:pointer;

  transition:.2s;

  font-size:13px;

}

.category-item.active{

  border-color:var(--accent);

  background:
  linear-gradient(
    90deg,
    rgba(0,198,255,.15),
    rgba(125,92,255,.12)
  );

}

/* ===== CHANNELS ===== */

.channels{

  padding:12px;
  padding-top:4px;

}

.channel-grid{

  display:grid;

  grid-template-columns:
  repeat(3,minmax(0,1fr));

  gap:8px;

}

/* ===== CARD ===== */

.channel-card{

  overflow:hidden;

  border-radius:14px;

  background:#12151d;

  border:
  1px solid rgba(255,255,255,.06);

  cursor:pointer;

  transition:.2s;

}

.channel-card:hover{

  border-color:var(--accent);

}

.channel-banner{

  height:70px;

  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;

  background:
  linear-gradient(
    135deg,
    rgba(0,198,255,.18),
    rgba(125,92,255,.14)
  );

}

.channel-banner img{

  width:42px;
  height:42px;

  object-fit:contain;

  padding:4px;

  border-radius:10px;

  background:white;

}

.channel-content{

  padding:8px;

}

.channel-content h3{

  font-size:11px;

  font-weight:600;

  line-height:1.3;

  overflow:hidden;

  text-overflow:ellipsis;

  display:-webkit-box;

  -webkit-line-clamp:2;

  -webkit-box-orient:vertical;

}

.channel-content p{

  margin-top:2px;

  color:var(--muted);

  font-size:9px;

  text-transform:capitalize;

}

/* ===== FLOATING ===== */

.social-float{

  position:fixed;

  bottom:20px;
  right:20px;

  z-index:9999;

}

.social-btn{

  width:56px;
  height:56px;

  border-radius:50%;

  border:none;

  background:
  linear-gradient(
    135deg,
    var(--accent),
    var(--accent2)
  );

  color:white;

  font-size:20px;

  cursor:pointer;

  box-shadow:
  0 5px 20px rgba(0,0,0,.35);

}

.social-links{

  position:absolute;

  bottom:68px;
  right:0;

  display:none;

  flex-direction:column;

  gap:10px;

}

.social-links.show{
  display:flex;
}

.social-links a{

  width:46px;
  height:46px;

  border-radius:50%;

  display:flex;
  justify-content:center;
  align-items:center;

  text-decoration:none;

  color:white;

  background:#12151d;

  border:
  1px solid rgba(255,255,255,.08);

}

/* ===== DESKTOP ===== */

@media(min-width:900px){

  video{
    height:70vh;
  }

  .channel-grid{

    grid-template-columns:
    repeat(auto-fill,minmax(140px,1fr));

  }

}

/* ===== NEWS TICKER ===== */

.news-ticker{

  margin-top:12px;

  height:48px;

  display:flex;
  align-items:center;

  overflow:hidden;

  border-radius:14px;

  background:#12151d;

  border:
  1px solid rgba(255,255,255,.06);

}

.ticker-label{

  height:100%;

  padding:0 18px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:13px;
  font-weight:700;

  background:
  linear-gradient(
    90deg,
    var(--accent),
    var(--accent2)
  );

  color:white;

  flex-shrink:0;

  animation:blink 1s infinite;

}

.ticker-wrapper{

  flex:1;

  overflow:hidden;

  position:relative;

}

.ticker-text{

  display:inline-block;

  white-space:nowrap;

  min-width:100%;

  padding-left:100%;

  animation:tickerMove 22s linear infinite;

  font-size:13px;

  color:white;

  will-change:transform;

}

@keyframes tickerMove{

  from{
    transform:translateX(0);
  }

  to{
    transform:translateX(-100%);
  }

}

@keyframes blink{

  0%{
    opacity:1;
  }

  50%{
    opacity:.5;
  }

  100%{
    opacity:1;
  }

}

</style>

</head>

<body>

<div class="app">

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
📺 Free IPTV
</div>

<div class="live-badge">
● LIVE
</div>

</div>

<!-- HERO -->

<div class="hero">

<!-- PLAYER -->

<div class="player-card">

<video
id="video"
controls
playsinline
crossorigin="anonymous"
></video>

</div>

<!-- NEWS TICKER -->

<div class="news-ticker">

<div class="ticker-label">
● LIVE
</div>

<div class="ticker-wrapper">

<div class="ticker-text">

🔴Wait For Playlists & Channels To Load Perfectly 🔥 Welcome To Free IPTV &nbsp;&nbsp;&nbsp;
⚽ Live Football Streaming Available &nbsp;&nbsp;&nbsp;
🎬 Watch Movies & Sports Free &nbsp;&nbsp;&nbsp;
📺 Enjoy Premium Channels &nbsp;&nbsp;&nbsp;
🚀 Smooth Streaming Experience &nbsp;&nbsp;&nbsp;

</div>

</div>

</div>

<!-- CONTROLS -->

<div class="controls">

<select
id="playlistSelect"
class="select"
>

<option value="0">
Ayna OTT
</option>

<option value="1">
XFire Playlist
</option>

<option value="2">
Sony Liv Event
</option>

<option value="3">
Fancode BD
</option>

<option value="4">
FIFA Live
</option>

<option value="5">
Akash Go
</option>

<option value="6">
Mix Playlist
</option>

<option value="7">
AX Sports
</option>

</select>

<select
id="fitMode"
class="select"
>

<option value="contain">
Fit Screen
</option>

<option value="cover">
Zoom Fill
</option>

<option value="fill">
Stretch
</option>

</select>

</div>

<!-- SEARCH -->

<div class="search-box">

<input
type="text"
id="searchInput"
class="search"
placeholder="Search channels..."
>

</div>

<!-- CATEGORY -->

<div
class="category-slider"
id="categoryList"
></div>

</div>

<!-- CHANNELS -->

<div class="channels">

<div
class="channel-grid"
id="channelContainer"
></div>

</div>

</div>

<!-- FLOATING -->

<div class="social-float">

<button
class="social-btn"
id="socialToggle"
>

<i class="fa-solid fa-share-nodes"></i>

</button>

<div
class="social-links"
id="socialLinks"
>

<a href="https://facebook.com/"
target="_blank">

<i class="fab fa-facebook-f"></i>

</a>

<a href="https://instagram.com/"
target="_blank">

<i class="fab fa-instagram"></i>

</a>

<a href="https://youtube.com/"
target="_blank">

<i class="fab fa-youtube"></i>

</a>

<a href="https://t.me/"
target="_blank">

<i class="fab fa-telegram"></i>

</a>

</div>

</div>

<script>

/* ===== PLAYLISTS ===== */

const playlists = [

"https://raw.githubusercontent.com/srhady/AynaOTT/refs/heads/main/aynaott.m3u",

"https://private-zone-by-xfireflix.pages.dev/playlist-isp-bdix.m3u",

"https://raw.githubusercontent.com/srhady/SonyLiv/refs/heads/main/sonyliv_playlist.m3u",

"https://raw.githubusercontent.com/tuhin0408/GlobalStream-IPTV/refs/heads/main/playlist/wc.m3u",

"https://raw.githubusercontent.com/srhady/fifaplus/refs/heads/main/fifa_live.m3u",

"https://raw.githubusercontent.com/srhady/Hady/refs/heads/main/akash_live.m3u",

"https://raw.githubusercontent.com/ashik4u/iptv-m3u-bot/refs/heads/main/output/all.m3u",

"https://raw.githubusercontent.com/srhady/axsports/refs/heads/main/playlist.m3u"

];

/* ===== ELEMENTS ===== */

const video =
document.getElementById("video");

const playlistSelect =
document.getElementById("playlistSelect");

const searchInput =
document.getElementById("searchInput");

const categoryList =
document.getElementById("categoryList");

const channelContainer =
document.getElementById("channelContainer");

const fitMode =
document.getElementById("fitMode");

/* ===== PLAYER ===== */

const player = new Plyr(video,{

controls:[

'play-large',
'rewind',
'play',
'fast-forward',
'progress',
'current-time',
'mute',
'volume',
'settings',
'pip',
'airplay',
'fullscreen'

]

});

let hls;

let allChannels = [];

let selectedCategory = "All";

/* ===== LOAD ===== */

async function loadPlaylist(index){

channelContainer.innerHTML = "";

categoryList.innerHTML = "";

allChannels = [];

try{

const res =
await fetch(playlists[index]);

const text =
await res.text();

parseM3U(text);

renderCategories();

renderChannels();

}catch(err){

channelContainer.innerHTML =
"<p style='padding:20px'>Playlist failed.</p>";

}

}

/* ===== PARSE ===== */

function parseM3U(data){

const lines =
data.split('\n');

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

const line =
lines[i];

const name =
line.split(',')[1]?.trim()
|| "Unknown";

const logoMatch =
line.match(/tvg-logo="(.*?)"/);

const groupMatch =
line.match(/group-title="(.*?)"/);

const logo =
logoMatch
? logoMatch[1]
:
"https://cdn-icons-png.flaticon.com/512/2991/2991148.png";

const category =
groupMatch
? groupMatch[1]
:
"other";

const url =
lines[i+1]?.trim();

if(url && url.startsWith("http")){

allChannels.push({

name,
logo,
category,
url

});

}

}

}

}

/* ===== CATEGORY ===== */

function renderCategories(){

categoryList.innerHTML = "";

const map = {};

allChannels.forEach(channel=>{

const cat =
channel.category || "other";

if(!map[cat]){

map[cat] = 0;

}

map[cat]++;

});

categoryList.appendChild(

createCategory(
"All",
allChannels.length
)

);

Object.keys(map)
.sort()
.forEach(cat=>{

categoryList.appendChild(

createCategory(
cat,
map[cat]
)

);

});

}

function createCategory(name,count){

const div =
document.createElement("div");

div.className =
"category-item";

if(name === selectedCategory){

div.classList.add("active");

}

div.innerHTML = `

<div>
${name}
</div>

<div>
${count}
</div>

`;

div.onclick = ()=>{

selectedCategory = name;

renderCategories();

renderChannels();

};

return div;

}

/* ===== CHANNELS ===== */

function renderChannels(){

channelContainer.innerHTML = "";

const search =
searchInput.value.toLowerCase();

const filtered =
allChannels.filter(channel=>{

const searchMatch =

channel.name
.toLowerCase()
.includes(search);

const categoryMatch =

selectedCategory === "All"

||

channel.category ===
selectedCategory;

return (
searchMatch &&
categoryMatch
);

});

filtered.forEach(channel=>{

const card =
document.createElement("div");

card.className =
"channel-card";

card.innerHTML = `

<div class="channel-banner">

<img src="${channel.logo}">

</div>

<div class="channel-content">

<h3>${channel.name}</h3>

<p>${channel.category}</p>

</div>

`;

card.onclick = ()=>{

playChannel(channel);

};

channelContainer.appendChild(card);

});

}

/* ===== PLAY ===== */

function playChannel(channel){

   // Destroy old HLS instance
   if(hls){

      hls.destroy();

   }

   const url = channel.url;

   // Reset old source
   video.pause();

   video.removeAttribute("src");

   video.load();

   // ===== DIRECT VIDEO SUPPORT =====
   // MP4 / MKV / WEBM

   if(

      url.endsWith(".mp4") ||

      url.endsWith(".mkv") ||

      url.endsWith(".webm")

   ){

      video.src = url;

      video.load();

      player.play()

      .catch(err=>{

         console.log(err);

      });

      return;

   }

   // ===== NATIVE HLS SUPPORT =====

   if(

      video.canPlayType(
         'application/vnd.apple.mpegurl'
      )

   ){

      video.src = url;

      video.load();

      player.play()

      .catch(err=>{

         console.log(err);

      });

   }

   // ===== HLS.JS SUPPORT =====

   else if(Hls.isSupported()){

      hls = new Hls({

         enableWorker:true,

         lowLatencyMode:true

      });

      hls.loadSource(url);

      hls.attachMedia(video);

      hls.on(

         Hls.Events.MANIFEST_PARSED,

         function(){

            player.play();

         }

      );

      // ===== ERROR HANDLING =====

      hls.on(

         Hls.Events.ERROR,

         function(event,data){

            console.log(

               "HLS Error:",

               data

            );

         }

      );

   }

   // ===== UNSUPPORTED =====

   else{

      alert(

         "Video format not supported."

      );

   }

}

/* ===== FIT MODE ===== */

fitMode.addEventListener(

"change",

()=>{

video.style.objectFit =
fitMode.value;

}

);

/* ===== LANDSCAPE ===== */

document.addEventListener(
'fullscreenchange',
handleFullscreen
);

function handleFullscreen(){

if(document.fullscreenElement){

if(screen.orientation
&&
screen.orientation.lock){

screen.orientation
.lock('landscape')
.catch(()=>{});

}

}else{

if(screen.orientation
&&
screen.orientation.unlock){

screen.orientation.unlock();

}

}

}

/* ===== SEARCH ===== */

searchInput.addEventListener(
"input",
renderChannels
);

/* ===== PLAYLIST ===== */

playlistSelect.addEventListener(

"change",

e=>{

selectedCategory = "All";

loadPlaylist(
e.target.value
);

}

);

/* ===== SOCIAL ===== */

const socialToggle =
document.getElementById(
"socialToggle"
);

const socialLinks =
document.getElementById(
"socialLinks"
);

socialToggle.onclick = ()=>{

socialLinks.classList
.toggle("show");

};

/* ===== INIT ===== */

loadPlaylist(0);

</script>

</body>
</html>
